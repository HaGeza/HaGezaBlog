<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0908;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="glcanvas"></canvas>
    <script src="https://cdn.jsdelivr.net/gh/not-fl3/macroquad@master/js/mq_js_bundle.js"></script>
    <script>
        // Grab the 'sim' parameter from the URL (e.g., ?sim=gravity)
        const params = new URLSearchParams(window.location.search);
        const simName = params.get('sim');

        if (simName) {
            window.load(`/wasm/${simName}.wasm`);
        } else {
            console.error("No simulation name provided in URL parameters.");
        }
    </script>
</body>

</html>
